function sPct(id){const i=document.getElementById('pct-'+id);if(!i)return;const v=parseFloat(i.value);if(isNaN(v)||v<0||v>100)return;S.clients[id].descuento=v;aL(`Actualizó descuento de ${S.clients[id].nombre} a ${v}%`);i.style.borderColor='#2d8c4e';setTimeout(()=>{if(i)i.style.borderColor='';},1200);}
function rImportar(){if(!can('importar'))return`<div class="notice">Sin permiso para importar.</div>`;return`<div class="iz"><strong>Importar reporte semanal</strong><p>El sistema detectará todas las agencias y ordenará por código QZ.</p><input type="file" id="ef" accept=".xlsx,.xls" style="display:none" onchange="hF(this.files[0])"><button class="btn-i" onclick="document.getElementById('ef').click()">Seleccionar archivo .xlsx</button></div><div id="ip"></div>`;}
function hF(file){if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});const h=raw[0];const wi=h.findIndex(x=>String(x).toLowerCase()==='week');const ni=h.findIndex(x=>String(x).toLowerCase()==='name');const cui=h.findIndex(x=>String(x).toLowerCase()==='customer');const pi=h.findIndex(x=>String(x).toLowerCase()==='password');const mk=[];for(let i=0;i<raw.length;i++){const v=String(raw[i][0]).trim();if(/^\d[A-Z]{2,}$/.test(v))mk.push({ag:v,start:i+1});}for(let i=0;i<mk.length;i++)mk[i].end=i+1<mk.length?mk[i+1].start-1:raw.length;let wl='';const mh=h.find(x=>String(x).toLowerCase().startsWith('mon'));if(mh){const m=String(mh).match(/\d+\/\d+/);if(m)wl='Sem '+m[0];}if(!wl)wl='Sem '+(S.semanas.length+1);const bA={};mk.forEach(({ag,start,end})=>{const rows=[];for(let i=start;i<end;i++){const r=raw[i];const cu=String(r[cui]||'').trim();const pa=String(r[pi]||'').trim();const na=String(r[ni]||'').trim();const wk=parseFloat(r[wi])||0;if(!cu||cu.startsWith('Totals')||pa.toLowerCase()==='open')continue;rows.push({cust:cu,pass:pa,name:na,week:wk,ag});}bA[ag]=rows;});const aA=Object.values(bA).flat().filter(r=>r.week!==0);S.importPreview={weekLabel:wl,byAgency:bA,allActive:aA,agencyMarkers:mk};rIP();}catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);}
function rIP(){const p=S.importPreview;if(!p)return;const el=document.getElementById('ip');if(!el)return;const sems=sArr();const li=sems.length-1;el.innerHTML=`<div class="card"><div class="ch"><span class="ct">Vista previa — ${p.weekLabel}</span><button class="btn-i" onclick="cI()">Confirmar importación</button></div>${p.agencyMarkers.map(({ag})=>{const rows=sortQZ((p.byAgency[ag]||[]).filter(r=>r.week!==0).map(r=>({...r,id:r.cust})));if(!rows.length)return '';return`<div style="padding:10px 14px 0"><div style="font-size:12px;font-weight:600;margin-bottom:6px">${ag} — ${rows.length} activos</div><div class="tw"><table style="font-size:11px;margin-bottom:10px"><thead><tr><th>Código</th><th>Nombre</th><th>Balance</th><th>Arrastre</th><th>Total a cobrar</th></tr></thead><tbody>${rows.map(r=>{const ex=S.clients[r.cust];const pct=ex?(ex.descuento||DD):DD;const d=r.week<0?Math.round(Math.abs(r.week)*pct/100):0;const ac=r.week<0?Math.abs(r.week)-d:0;const ar=ex?csa(r.cust,li,sems,S.cortes):0;const tot=ac+ar;return`<tr><td><span class="qz">${r.cust}</span></td><td>${r.name}</td><td style="color:${r.week<0?'#c93030':'#2d8c4e'};font-weight:600">${r.week<0?'-':'+'}${fM(r.week)}</td><td>${ar>0?`<span style="color:#9a4a00;font-weight:600">${fM(ar)}</span>`:'—'}</td><td style="font-weight:600">${tot>0?fM(tot):'—'}</td></tr>`;}).join('')}</tbody></table></div></div>`;}).join('')}</div>`;}
function cI(){const p=S.importPreview;if(!p)return;if(!S.semanas.find(s=>s.label===p.weekLabel))S.semanas.push({label:p.weekLabel});S.cortes=S.cortes.filter(c=>c.semana!==p.weekLabel);p.agencyMarkers.forEach(({ag})=>{if(!S.agencies.includes(ag)){S.agencies.push(ag);S.agencies.sort();}});p.allActive.forEach(r=>{if(!S.clients[r.cust])S.clients[r.cust]={id:r.cust,nombre:r.name,usuario:r.pass,linea:0,descuento:DD,status:'activo',agencia:r.ag,telefono:'',email:''};else{S.clients[r.cust].nombre=r.name;S.clients[r.cust].usuario=r.pass;S.clients[r.cust].agencia=r.ag;}const cl=S.clients[r.cust];const pct=cl.descuento||DD;const d=r.week<0?Math.round(Math.abs(r.week)*pct/100):0;S.cortes.push({id:S.nextCorteId++,clienteId:r.cust,semana:p.weekLabel,balance:r.week,descuentoAplicado:d,montoCobrado:0,metodo:'',notas:'',status:r.week>0?'ganancia':'pendiente'});});aL(`Importó reporte ${p.weekLabel} — ${p.allActive.length} cortes`);S.importPreview=null;S.semFilter=p.weekLabel;sV('cortes');}
function rBadge(r){if(r==='admin')return`<span class="badge bp2">Admin</span>`;if(r==='capturista')return`<span class="badge bg">Capturista</span>`;return`<span class="badge bb">Visualizador</span>`;}
function tU(id){const u=S.usuarios.find(x=>x.id===id);if(!u)return;u.activo=!u.activo;aL(`${u.activo?'Activó':'Suspendió'} usuario @${u.username}`);rView();}
function rAdmin(){return`<div class="ah"><h2>Panel de administración</h2><p>Gestiona usuarios, roles y permisos del sistema</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px"><div class="sc"><div class="sl">Usuarios totales</div><div class="sv">${S.usuarios.length}</div></div><div class="sc"><div class="sl">Usuarios activos</div><div class="sv green">${S.usuarios.filter(u=>u.activo).length}</div></div></div><div class="card" style="margin-bottom:14px"><div class="ch"><span class="ct">Usuarios del sistema</span><button class="btn-p" onclick="oNU()">+ Nuevo usuario</button></div><div style="padding:12px 15px">${S.usuarios.map(u=>`<div class="uc"><div class="uca" style="background:${u.color};color:${u.textColor}">${ini(u.nombre)}</div><div class="uci"><div class="un2">${u.nombre} ${rBadge(u.rol)}</div><div class="um">@${u.username} · ${u.agencias.includes('__all__')?'Todas las agencias':u.agencias.join(', ')} · ${u.activo?'<span style="color:#2d8c4e">Activo</span>':'<span style="color:#c93030">Inactivo</span>'}</div></div><div class="uca2"><button class="abt" onclick="oEU('${u.id}')">Editar</button>${u.id!=='u1'?`<button class="btn-d" onclick="tU('${u.id}')">${u.activo?'Suspender':'Activar'}</button>`:''}</div></div>`).join('')}</div></div><div class="card"><div class="ch"><span class="ct">Registro de actividad</span></div><div style="padding:10px 15px">${S.activityLog.slice(0,10).map(l=>`<div class="lr"><span class="lt">${l.time}</span><span><span class="lu">@${l.user}</span> ${l.msg}</span></div>`).join('')}</div></div>`;}
function oP(cId){const c=S.cortes.find(x=>x.id===cId);if(!c)return;const cl=cO(c.clienteId);const sems=sArr();const idx=siOf(c.semana);const ar=car(c.clienteId,idx,sems,S.cortes);const aCS=Math.abs(c.balance)-c.descuentoAplicado;const tot=r2(aCS+ar-c.montoCobrado);S.modal='pago';S.modalData={corteId:cId,clienteId:c.clienteId,nombre:cl.nombre,semana:c.semana,balance:c.balance,descuentoAplicado:c.descuentoAplicado,arrastre:ar,aCobrarSemana:aCS,totalACobrar:tot,montoCobradoPrevio:c.montoCobrado,monto:tot,metodo:c.metodo||'transferencia',notas:c.notas||''};rModal();}
function cPago(){const d=S.modalData;const idx2=S.cortes.findIndex(c=>c.id===d.corteId);if(idx2<0)return;const nC=r2(d.montoCobradoPrevio+(parseFloat(d.monto)||0));const tot=r2(d.aCobrarSemana+d.arrastre);S.cortes[idx2].montoCobrado=nC;S.cortes[idx2].metodo=d.metodo;S.cortes[idx2].notas=d.notas;S.cortes[idx2].status=nC>=tot-1?'cobrado':'parcial';aL(`Registró ${S.cortes[idx2].status==='cobrado'?'pago completo':'pago parcial'} de ${d.nombre} — ${fM(parseFloat(d.monto)||0)}`);cModal();rView();}
function oNU(){S.modal='new-user';S.modalData={id:'',nombre:'',username:'',password:'',rol:'capturista',activo:true,agencias:['2ECB'],color:'#C9EDD6',textColor:'#2A7A4A'};rModal();}
function oEU(id){const u=S.usuarios.find(x=>x.id===id);S.modal='edit-user';S.modalData={...u,agencias:[...u.agencias]};rModal();}
function sUser(){const d=S.modalData;if(!d.nombre.trim()||!d.username.trim())return;const isN=S.modal==='new-user';if(isN){d.id='u'+Date.now();S.usuarios.push({...d});}else{const i=S.usuarios.findIndex(u=>u.id===d.id);S.usuarios[i]={...d};}aL(`${isN?'Creó':'Editó'} usuario @${d.username}`);cModal();rView();}
function tAU(ag){const d=S.modalData;if(ag==='__all__'){d.agencias=['__all__'];rModal();return;}if(d.agencias.includes('__all__'))d.agencias=[];if(d.agencias.includes(ag))d.agencias=d.agencias.filter(a=>a!==ag);else d.agencias.push(ag);if(!d.agencias.length)d.agencias=['__all__'];rModal();}
function oNClient(){S.modal='new-client';S.modalData={id:'',nombre:'',usuario:'',linea:'',descuento:DD,status:'activo',agencia:S.agency==='__all__'?(S.agencies[0]||''):S.agency,telefono:'',email:''};rModal();}
function oEClient(id){S.modal='edit-client';S.modalData={...S.clients[id]};rModal();}
function sClient(){const d=S.modalData;if(!d.nombre.trim())return;d.linea=parseFloat(d.linea)||0;d.descuento=parseFloat(d.descuento)||DD;const key=d.id||('CLI'+Date.now());S.clients[key]={...d,id:key};if(d.agencia&&!S.agencies.includes(d.agencia)){S.agencies.push(d.agencia);S.agencies.sort();}cModal();rView();}
function oNC(){const sems=sArr();S.modal='new-corte';S.modalData={clienteId:'',semana:sems[sems.length-1]||'',balance:'',descuentoAplicado:'',montoCobrado:'',metodo:'transferencia',notas:'',status:'pendiente'};rModal();}
function oEC(id){S.modal='edit-corte';S.modalData={...S.cortes.find(c=>c.id===id)};rModal();}
function sCorte(isE){const d=S.modalData;d.balance=parseFloat(d.balance)||0;d.descuentoAplicado=parseFloat(d.descuentoAplicado)||0;d.montoCobrado=parseFloat(d.montoCobrado)||0;if(isE){const i=S.cortes.findIndex(c=>c.id===d.id);S.cortes[i]=d;}else{d.id=S.nextCorteId++;S.cortes.push(d);}cModal();rView();}
function aD(){const d=S.modalData;const cl=cO(d.clienteId);const bal=parseFloat(d.balance)||0;const pct=cl.descuento!==undefined?cl.descuento:DD;d.descuentoAplicado=bal<0?Math.round(Math.abs(bal)*pct/100):0;rModal();}
function cModal(){S.modal=null;rModal();}
function rModal(){const mc=document.getElementById('mc');if(!S.modal){mc.innerHTML='';return;}const sems=sArr();
if(S.modal==='pago'){const d=S.modalData;const m=parseFloat(d.monto)||0;const tot=d.totalACobrar;mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="mh"><div><div class="mt">Registrar pago</div><div class="ms">${d.nombre} · ${d.semana}</div></div><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="pr"><div class="prow"><span class="lbl">Balance semana</span><span style="color:#c93030;font-weight:600">- ${fM(d.balance)}</span></div><div class="prow"><span class="lbl">Descuento pronto pago</span><span style="color:#8a5500;font-weight:600">+ ${fM(d.descuentoAplicado)}</span></div><div class="prow sub"><span class="lbl">A cobrar esta semana</span><span style="font-weight:600">${fM(d.aCobrarSemana)}</span></div>${d.arrastre>0?`<div class="prow" style="margin-top:4px"><span class="lbl" style="color:#9a4a00">+ Arrastre anterior</span><span style="color:#9a4a00;font-weight:600">${fM(d.arrastre)}</span></div>`:''} ${d.montoCobradoPrevio>0?`<div class="prow"><span class="lbl">- Ya cobrado</span><span style="color:#2d8c4e;font-weight:600">- ${fM(d.montoCobradoPrevio)}</span></div>`:''}<div class="prow tot"><span class="lbl" style="font-weight:600">Total pendiente</span><span class="val">${fM(tot)}</span></div></div><div class="fg"><label>Monto recibido ($)</label><input type="number" id="mp" value="${d.monto}" oninput="S.modalData.monto=this.value;rModal()" style="font-size:16px;padding:10px 12px"/>${m>0&&m<tot-0.5?`<div style="font-size:11px;color:#9a6000;margin-top:3px">Pago parcial — quedaría ${fM(tot-m)}</div>`:''}${m>=tot-0.5&&m>0?`<div style="font-size:11px;color:#1a6b35;margin-top:3px">Pago completo ✓</div>`:''}</div><div class="fg"><label>Método</label><div class="mb-row"><button class="mb-btn${d.metodo==='transferencia'?' active':''}" onclick="S.modalData.metodo='transferencia';rModal()">Transferencia</button><button class="mb-btn${d.metodo==='efectivo'?' active':''}" onclick="S.modalData.metodo='efectivo';rModal()">Efectivo</button><button class="mb-btn${d.metodo==='otro'?' active':''}" onclick="S.modalData.metodo='otro';rModal()">Otro</button></div></div><div class="fg"><label>Notas</label><textarea oninput="S.modalData.notas=this.value" placeholder="Referencia, observaciones...">${d.notas||''}</textarea></div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-pay" style="padding:8px 18px;font-size:13px" onclick="cPago()">Confirmar pago</button></div></div></div>`;setTimeout(()=>{const i=document.getElementById('mp');if(i){i.focus();i.select();}},50);return;}
if(S.modal==='new-client'||S.modal==='edit-client'){const d=S.modalData;const isN=S.modal==='new-client';mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="mh"><span class="mt">${isN?'Nuevo cliente':'Editar cliente'}</span><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="sdiv">Datos generales</div><div class="fr"><div class="fg"><label>Nombre</label><input value="${d.nombre}" oninput="S.modalData.nombre=this.value" placeholder="NOMBRECLIENTE"/></div><div class="fg"><label>Usuario</label><input value="${d.usuario||''}" oninput="S.modalData.usuario=this.value" placeholder="USUARIO"/></div></div><div class="fr"><div class="fg"><label>Agencia</label><select onchange="S.modalData.agencia=this.value">${S.agencies.map(ag=>`<option value="${ag}" ${d.agencia===ag?'selected':''}>${ag}</option>`).join('')}</select></div><div class="fg"><label>Línea de crédito ($)</label><input type="number" value="${d.linea}" oninput="S.modalData.linea=this.value" placeholder="50000"/></div></div><div class="fr"><div class="fg"><label>Descuento (%)</label><input type="number" min="0" max="100" step="0.5" value="${d.descuento}" oninput="S.modalData.descuento=this.value"/></div><div class="fg"><label>Estado</label><select onchange="S.modalData.status=this.value"><option value="activo" ${d.status==='activo'?'selected':''}>Activo</option><option value="suspendido" ${d.status==='suspendido'?'selected':''}>Suspendido</option></select></div></div><div class="sdiv" style="margin-top:4px">Datos de contacto</div><div class="fr"><div class="fg"><label>Teléfono / WhatsApp</label><input type="tel" value="${d.telefono||''}" oninput="S.modalData.telefono=this.value" placeholder="5512345678"/></div><div class="fg"><label>Correo electrónico</label><input type="email" value="${d.email||''}" oninput="S.modalData.email=this.value" placeholder="cliente@email.com"/></div></div><div class="notice" style="font-size:11px">Con teléfono y email podrás enviar recordatorios directamente desde la tabla de cortes.</div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sClient()">Guardar</button></div></div></div>`;return;}
if(S.modal==='new-user'||S.modal==='edit-user'){const d=S.modalData;const isN=S.modal==='new-user';mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="mh"><div class="mt">${isN?'Nuevo usuario':'Editar usuario'}</div><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="fr"><div class="fg"><label>Nombre completo</label><input value="${d.nombre}" oninput="S.modalData.nombre=this.value" placeholder="Nombre Apellido"/></div><div class="fg"><label>Usuario (login)</label><input value="${d.username}" oninput="S.modalData.username=this.value" placeholder="usuario123"/></div></div><div class="fg"><label>Contraseña</label><input type="password" value="${d.password}" oninput="S.modalData.password=this.value" placeholder="${isN?'Nueva contraseña':'Dejar vacío para no cambiar'}"/></div><div class="fg"><label>Rol</label><div class="rl"><button class="rb${d.rol==='admin'?' ra':''}" onclick="S.modalData.rol='admin';rModal()">Admin</button><button class="rb${d.rol==='capturista'?' rc':''}" onclick="S.modalData.rol='capturista';rModal()">Capturista</button><button class="rb${d.rol==='viewer'?' rv':''}" onclick="S.modalData.rol='viewer';rModal()">Visualizador</button></div></div><div class="fg"><label>Acceso a agencias</label><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px"><button class="tab${d.agencias.includes('__all__')?' active':''}" onclick="tAU('__all__')" style="font-size:11px">Todas</button>${S.agencies.map(ag=>`<button class="tab${d.agencias.includes(ag)&&!d.agencias.includes('__all__')?' active':''}" onclick="tAU('${ag}')" style="font-size:11px">${ag}</button>`).join('')}</div></div><div class="notice" style="font-size:11px"><strong>Permisos del rol (${d.rol}):</strong> ${Object.entries(RP[d.rol]||{}).filter(([k,v])=>v).map(([k])=>'✓ '+k.replace(/_/g,' ')).join(' · ')}</div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sUser()">Guardar</button></div></div></div>`;return;}
if(S.modal==='new-corte'||S.modal==='edit-corte'){const isE=S.modal==='edit-corte';const d=S.modalData;const bal=parseFloat(d.balance)||0;const desc=parseFloat(d.descuentoAplicado)||0;const ac=bal<0?Math.abs(bal)-desc:0;mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="mh"><span class="mt">${isE?'Editar corte':'Registrar corte'}</span><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="fr"><div class="fg"><label>Cliente</label><select onchange="S.modalData.clienteId=this.value;aD()"><option value="">Seleccionar...</option>${fC().map(c=>`<option value="${c.id}" ${d.clienteId===c.id?'selected':''}>${c.id} — ${c.nombre}</option>`).join('')}</select></div><div class="fg"><label>Semana</label><select onchange="S.modalData.semana=this.value">${sems.map(s=>`<option value="${s}" ${d.semana===s?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="fr"><div class="fg"><label>Balance ($)</label><input type="number" value="${d.balance}" oninput="S.modalData.balance=this.value;aD()" placeholder="-5000"/></div><div class="fg"><label>Descuento ($)</label><input type="number" value="${d.descuentoAplicado}" oninput="S.modalData.descuentoAplicado=this.value;rModal()" placeholder="0"/></div></div>${ac>0?`<div style="background:#fffbea;border:0.5px solid #f5d47a;border-radius:8px;padding:9px 13px;font-size:13px">A cobrar: <strong>${fM(ac)}</strong></div>`:''}<div class="fr"><div class="fg"><label>Estado</label><select onchange="S.modalData.status=this.value"><option value="pendiente" ${d.status==='pendiente'?'selected':''}>Pendiente</option><option value="cobrado" ${d.status==='cobrado'?'selected':''}>Cobrado</option><option value="parcial" ${d.status==='parcial'?'selected':''}>Parcial</option><option value="ganancia" ${d.status==='ganancia'?'selected':''}>Ganancia</option></select></div><div class="fg"><label>Notas</label><input value="${d.notas||''}" oninput="S.modalData.notas=this.value" placeholder="Comentarios..."/></div></div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sCorte(${isE})">Guardar</button></div></div></div>`;}}
render();
</script>
