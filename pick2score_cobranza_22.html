<script>
// ── CONSTANTS ─────────────────────────────────────────────
const DD=10;
const AVC=['#C9D5F7','#C9EDD6','#FAE3C9','#F7C9C9','#D9C9F7','#C9F0FA','#F7EBC9','#D9EDD6','#F5D4C9','#EDD6F7'];
const AVT=['#3A52A8','#2A7A4A','#9A5A1A','#9A2A2A','#5A3AA8','#1A7A9A','#8A7A1A','#2A6A4A','#8A3A1A','#6A2A9A'];
const AGC=['#4a90d9','#e8953a','#5bb85d','#c0392b','#9b59b6','#16a085','#f39c12'];
const RP={
  admin:{dashboard:true,cobranza:true,clientes:true,importar:true,registrar_pago:true,editar_descuento:true,admin_panel:true,estado_cuenta:true},
  capturista:{dashboard:true,cobranza:true,clientes:true,importar:false,registrar_pago:true,editar_descuento:false,admin_panel:false,estado_cuenta:true},
  viewer:{dashboard:true,cobranza:true,clientes:true,importar:false,registrar_pago:false,editar_descuento:false,admin_panel:false,estado_cuenta:true}
};

// ── TOTP 2FA (RFC 6238) ───────────────────────────────────
const B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function b32decode(s){let bits=0,val=0,out=[];s=s.replace(/=+$/,'').toUpperCase();for(let i=0;i<s.length;i++){val=(val<<5)|B32.indexOf(s[i]);bits+=5;if(bits>=8){out.push((val>>>(bits-8))&0xff);bits-=8;}}return out;}
async function hmacSHA1(key,msg){const k=new Uint8Array(key);const m=new Uint8Array(msg);const ck=await crypto.subtle.importKey('raw',k,{name:'HMAC',hash:'SHA-1'},false,['sign']);const sig=await crypto.subtle.sign('HMAC',ck,m);return new Uint8Array(sig);}
function numToBytes(n){const b=new Array(8).fill(0);for(let i=7;i>=0;i--){b[i]=n&0xff;n=Math.floor(n/256);}return b;}
async function totp(secret,offset=0){const key=b32decode(secret);const t=Math.floor(Date.now()/1000/30)+offset;const msg=numToBytes(t);const h=await hmacSHA1(key,msg);const o=h[19]&0xf;const code=((h[o]&0x7f)<<24)|((h[o+1]&0xff)<<16)|((h[o+2]&0xff)<<8)|(h[o+3]&0xff);return String(code%1000000).padStart(6,'0');}
async function verifyTotp(secret,input){for(let i=-1;i<=1;i++){if(await totp(secret,i)===input)return true;}return false;}
function genSecret(){let s='';for(let i=0;i<16;i++)s+=B32[Math.floor(Math.random()*32)];return s;}
function totpUri(secret,user){return`otpauth://totp/Pick2Score:${encodeURIComponent(user)}?secret=${secret}&issuer=Pick2Score&algorithm=SHA1&digits=6&period=30`;}
function qrUrl(uri){return`https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(uri)}&size=180x180&margin=10`;}

// ── NUMBER FORMAT ─────────────────────────────────────────
const fmt=n=>Number(n).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
const fM=n=>'$'+fmt(Math.abs(n));
const fSign=n=>(n>=0?'+':'-')+'$'+fmt(Math.abs(n));
const fPos=n=>'+$'+fmt(Math.abs(n));
const fNeg=n=>'-$'+fmt(Math.abs(n));
const r2=n=>Math.round(n*100)/100;

// ── SEMANAS ───────────────────────────────────────────────
const SEM_META=[
  {label:'Sem 1-2026',date:new Date('2026-02-16')},
  {label:'Sem 2-2026',date:new Date('2026-02-23')},
  {label:'Sem 3-2026',date:new Date('2026-03-02')},
  {label:'Sem 4-2026',date:new Date('2026-03-16')}
];
const SEM_DATE_MAP={};SEM_META.forEach(s=>{SEM_DATE_MAP[s.label]=s.date;});
function semDate(l){return SEM_DATE_MAP[l]||new Date();}
function semDateFmt(l){const d=semDate(l);const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${d.getDate()} ${months[d.getMonth()]}`;}
function semDisplay(l){
  const m=SEM_META.find(s=>s.label===l);
  if(m){const parts=m.label.split('-');return`${parts[0]}/${parts[1]} (${semDateFmt(l)})`;}

// ── CORE FORMULA ──────────────────────────────────────────
// Perspectiva del CLIENTE:
//   s > 0 = saldo a su favor (verde, le debemos)
//   s < 0 = deuda (rojo, nos debe)
// Cada semana: s += balance - descuento (pérdida) + cobrado/pagado
function csa(cid,hi,sl,co){
  let s=0;
  for(let i=0;i<=hi;i++){
    const c=co.find(x=>x.clienteId===cid&&x.semana===sl[i]);
    if(!c)continue;
    if(c.balance<0){
      const desc=c.descuentoAplicado||0;
      s-=Math.abs(c.balance)-desc; // cliente pierde → nos debe más
      s+=c.montoCobrado||0;        // cobrado → reduce deuda
    }else if(c.balance>0){
      s+=c.balance;                 // cliente gana → le debemos más
      s-=c.pagadoGanancia||0;      // pagado → reduce lo que le debemos
    }
  }
  return r2(s);
}
function car2(cid,sidx,sl,co){if(sidx<=0)return 0;return csa(cid,sidx-1,sl,co);}
function arNet(cid,sidx,sems,co){return car2(cid,sidx,sems,co);}

  let msg=`Hola *${cl.nombre}*, esperamos que estés muy bien 😊\n\nTe enviamos el resumen de tu cuenta al corte de *${semD}*:\n\n`;
  if(nb.tipo==='perdedor'){
    msg+=`📊 *Desglose de tu saldo:*\n`;
    msg+=`   Balance semanal: ${fNeg(Math.abs(nb.balance))}\n`;
    if(nb.desc>0)msg+=`   Descuento pronto pago: ${fPos(nb.desc)}\n`;
    msg+=`   A cobrar esta semana: ${fNeg(nb.aCobrar)}\n`;
    if(nb.ar!==0)msg+=`   Saldo anterior: ${fSign(nb.ar)}\n`;
    msg+=`\n🔴 *Saldo total al corte: ${fSign(nb.sa)}*\n`;
    msg+=buildBankBlock();
    msg+=`\n\nPor favor realiza tu pago a más tardar el *viernes*. ¡Gracias! 🙏\n\n— Equipo Pick2Score`;
  }else if(nb.tipo==='ganador_con_deuda'){
    msg+=`📊 *Desglose de tu saldo:*\n`;
    msg+=`   🎉 Ganancia de la semana: ${fPos(nb.balance)}\n`;
    msg+=`   Saldo anterior pendiente: ${fSign(nb.ar)}\n`;
    msg+=`\n${nb.sa<0?'🔴 *Saldo a liquidar: '+fSign(nb.sa)+'*':'✅ *¡Tu deuda quedó saldada!*'}\n`;
    if(nb.sa<0){msg+=buildBankBlock();msg+=`\n\nPor favor liquida el saldo. ¡Gracias! 🙏`;}
    else msg+=`\nNos ponemos en contacto para coordinar. ¡Gracias! 🙏`;
    msg+=`\n\n— Equipo Pick2Score`;
  }else{
    msg+=`🎉 *¡Buenas noticias!*\n\n   Ganancia: *${fPos(nb.balance)}*\n\n`;
    msg+=`💰 *Saldo a tu favor: ${fPos(nb.sa)}*\n\nPara coordinarte, indícanos:\n\n1️⃣ *Transferencia* — banco, CLABE y titular\n2️⃣ *Efectivo* — día, horario y domicilio\n\n¡Gracias por confiar en Pick2Score! 🙏\n\n— Equipo Pick2Score`;
  }
  return msg;
}
function sWA(cid,sa,sem){
  const cl=cO(cid);if(!cl.telefono){alert('Sin teléfono.');return;}
  window.open(`https://wa.me/52${cl.telefono.replace(/\D/g,'')}?text=${encodeURIComponent(buildMsg(cid,sem))}`,'_blank');
  aL(`Envió WhatsApp a ${cl.nombre}`);
}
function sEM(cid,sa,sem){
  const cl=cO(cid);if(!cl.email){alert('Sin email.');return;}
  const sub=encodeURIComponent(`Estado de cuenta Pick2Score — ${cl.nombre} — ${semDisplay(sem)}`);
  const bod=encodeURIComponent(buildMsg(cid,sem).replace(/\*/g,'').replace(/[😊🙏📊📋💰🎉🔴🟡✅1️⃣2️⃣📅📍]/gu,''));
  window.open(`mailto:${cl.email}?subject=${sub}&body=${bod}`,'_blank');
  aL(`Envió email a ${cl.nombre}`);
}

// ── ESTADO DE CUENTA ROWS ─────────────────────────────────
function ecRows(cid){
  const sems=sArr();
  const cortes=S.cortes.filter(c=>c.clienteId===cid).sort((a,b)=>siOf(a.semana)-siOf(b.semana));
  let saldoAcum=0;
  return cortes.map(c=>{
    const arrastre=r2(saldoAcum);
    const desc=c.descuentoAplicado||0;
    const esGan=c.balance>0;
    if(esGan){
      const pagado=c.pagadoGanancia||0;
      const balNeto=c.balance;
      saldoAcum=r2(saldoAcum+c.balance-pagado);
      return{sem:c.semana,balance:c.balance,desc:0,balNeto,arrastre,cobPag:pagado,saldoAcum:r2(saldoAcum),status:c.status,metodo:c.metodo,fecha:c.fechaPago,comp:c.comprobante,esGan:true};
    }else{
      const aCobrar=Math.abs(c.balance)-desc;
      const cobrado=c.montoCobrado||0;
      const balNeto=-aCobrar;
      saldoAcum=r2(saldoAcum-aCobrar+cobrado);
      return{sem:c.semana,balance:c.balance,desc,balNeto,arrastre,cobPag:cobrado,saldoAcum:r2(saldoAcum),status:c.status,metodo:c.metodo,fecha:c.fechaPago,comp:c.comprobante,esGan:false};
    }
  });
}

function thS(view,col,label,cls=''){const a=S.sortCol[view]===col;const ar=a?(S.sortDir[view]>0?'↑':'↓'):'⇅';return`<th class="${cls}${a?' sorted':''}" onclick="tSort('${view}','${col}')">${label} <span class="sa">${ar}</span></th>`;}

function updMontoHint(){
  const d=S.modalData;const inp=document.getElementById('mp');if(!inp)return;
  const m=parseFloat(inp.value)||0;const tot=d.totalACobrar||0;
  const hint=document.getElementById('monto-hint');if(!hint)return;
  if(d.editMode&&m===0)hint.innerHTML=`<span style="color:var(--re)">Monto 0 → revertirá a <strong>Pendiente</strong></span>`;
  else if(m>0&&m<tot-0.5)hint.innerHTML=`<span style="color:var(--am)">Pago parcial — quedaría pendiente <strong>${fM(tot-m)}</strong></span>`;
  else if(m>=tot-0.5&&m>0)hint.innerHTML=`<span style="color:var(--gr);font-weight:600">✓ Pago completo</span>`;
  else hint.innerHTML='';
}

const fC=()=>{const ag=S.agency;return sortQZ(ag==='__all__'?Object.values(S.clients):Object.values(S.clients).filter(c=>c.agencia===ag));};
const fCo=()=>{
  const ids=new Set(fC().map(c=>c.id));
  let co=S.cortes.filter(x=>ids.has(x.clienteId));
  if(S.semFilter)co=co.filter(x=>x.semana===S.semFilter);
  const col=S.sortCol.cobranza;const dir=S.sortDir.cobranza;
  if(col){co=[...co].sort((a,b)=>{
    let va,vb;
    if(col==='agencia'){va=cO(a.clienteId).agencia||'';vb=cO(b.clienteId).agencia||'';}
    else if(col==='nombre'){va=cO(a.clienteId).nombre||'';vb=cO(b.clienteId).nombre||'';}
    else{va=a[col];vb=b[col];}
    if(va==null)va='';if(vb==null)vb='';
    return typeof va==='string'?dir*String(va).localeCompare(String(vb)):dir*(va-vb);
  });}else co=sortQZ(co);return co;
};

function bs(s){if(s==='cobrado')return`<span class="badge bg">Cobrado</span>`;if(s==='parcial')return`<span class="badge bo">Parcial</span>`;if(s==='pendiente')return`<span class="badge ba">Pendiente</span>`;if(s==='ganancia')return`<span class="badge bb">Ganancia</span>`;if(s==='pagado')return`<span class="badge bg">Pagado ✓</span>`;return`<span class="badge bgr">${s}</span>`;}

function rDash(){
  const sems=sArr();const semA=sems[sems.length-1];const semAIdx=sems.length-1;
  const allC=fC();
  // P&L stats desde perspectiva de la casa (pérdidas cliente = ganancia casa)
  let tGanApuesta=0,tPerdApuesta=0,tCob=0;
  S.cortes.forEach(c=>{
    const cl=cO(c.clienteId);if(S.agency!=='__all__'&&cl.agencia!==S.agency)return;
    if(c.balance<0){tGanApuesta+=Math.abs(c.balance);tCob+=c.montoCobrado;}
    else{tPerdApuesta+=c.balance;}
  });
  const ca=semA?S.cortes.filter(c=>{const cl=cO(c.clienteId);return(S.agency==='__all__'||cl.agencia===S.agency)&&c.semana===semA;}):[];
  const deu=ca.filter(c=>c.balance<0).reduce((s,c)=>s+Math.abs(c.balance),0);
  const cob=ca.filter(c=>c.status==='cobrado'||c.status==='parcial').reduce((s,c)=>s+c.montoCobrado,0);
  const act=allC.filter(c=>c.status==='activo').length;
  const sat=allC.reduce((sum,cl)=>sum+Math.min(0,csa(cl.id,semAIdx,sems,S.cortes)),0); // negative = deuda

  const agToShow=S.agency==='__all__'?S.agencies:[S.agency];
  const agS=`<div class="asg">${agToShow.map(ag=>{
    const agCl=Object.values(S.clients).filter(c=>c.agencia===ag);
    const agIds=new Set(agCl.map(c=>c.id));
    let aGan=0,aPerd=0,aCo=0;
    S.cortes.filter(c=>agIds.has(c.clienteId)).forEach(c=>{
      if(c.balance<0){aGan+=Math.abs(c.balance);aCo+=c.montoCobrado;}
      else{aPerd+=c.balance;aCo-=(c.pagadoGanancia||0);}
    });
    const aPend=Math.abs(agCl.reduce((sum,cl)=>sum+Math.min(0,csa(cl.id,semAIdx,sems,S.cortes)),0));
    const pnl=aGan-aPerd;
    return`<div class="agc" onclick="sAg('${ag}')"><div class="agn"><span style="width:8px;height:8px;border-radius:50%;background:${agC(ag)};display:inline-block;flex-shrink:0"></span>${ag}<span class="badge bgr" style="font-size:10px">${agCl.length}</span></div>
    <div class="agr">P&L acumulado<span style="color:${pnl>=0?'var(--gr)':'var(--re)'}">${fSign(pnl)}</span></div>
    <div class="agr">Gan. apuesta<span style="color:var(--gr)">${fM(aGan)}</span></div>
    <div class="agr">Cobrado<span style="color:#4a90d9">${fM(Math.max(0,aCo))}</span></div>
    <div class="agr">Cartera vencida<span style="color:var(--am)">${fM(aPend)}</span></div></div>`;
  }).join('')}</div>`;

  const maxB=Math.max(tGanApuesta,tCob,tPerdApuesta)||1;

  const comparativa=`<div class="card"><div class="ch"><span class="ct">P&L — Ganancia de apuesta vs Cobrado</span></div><div style="padding:14px 16px;display:flex;flex-direction:column;gap:14px">

    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--ts)">Total cobrado</span><span style="font-weight:700;color:#4a90d9">${fM(tCob)}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(tCob/maxB*100)}%;background:#4a90d9"></div></div></div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--ts)">Pagado a ganadores (cliente ganó)</span><span style="font-weight:700;color:var(--re)">${fM(tPerdApuesta)}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(tPerdApuesta/maxB*100)}%;background:var(--re)"></div></div></div>

    return`<tr>

// ── IMPORTAR ──────────────────────────────────────────────
function rImp(){if(!can('importar'))return`<div class="notice">Sin permiso.</div>`;return`<div class="iz"><strong>Importar reporte semanal</strong><p>Detecta agencias automáticamente. El número de semana se asigna consecutivamente.</p><input type="file" id="ef" accept=".xlsx,.xls" style="display:none" onchange="hF(this.files[0])"><button class="btn-i" onclick="document.getElementById('ef').click()">📂 Seleccionar archivo .xlsx</button></div><div id="ip"></div>`;}
function hF(file){if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});const h=raw[0];const wi=h.findIndex(x=>String(x).toLowerCase()==='week');const ni=h.findIndex(x=>String(x).toLowerCase()==='name');const cui=h.findIndex(x=>String(x).toLowerCase()==='customer');const pi=h.findIndex(x=>String(x).toLowerCase()==='password');const mk=[];for(let i=0;i<raw.length;i++){const v=String(raw[i][0]).trim();if(/^\d[A-Z]{2,}$/.test(v))mk.push({ag:v,start:i+1});}for(let i=0;i<mk.length;i++)mk[i].end=i+1<mk.length?mk[i+1].start-1:raw.length;
const nextN=S.semanas.length+1;const yr=new Date().getFullYear();const wl=`Sem ${nextN}-${yr}`;
const bA={};mk.forEach(({ag,start,end})=>{const rows=[];for(let i=start;i<end;i++){const r=raw[i];const cu=String(r[cui]||'').trim();const pa=String(r[pi]||'').trim();const na=String(r[ni]||'').trim();let wk=0;try{wk=parseFloat(r[wi])||0;}catch(e){}if(!cu||cu.startsWith('Totals')||pa.toLowerCase()==='open'||isNaN(wk))continue;rows.push({cust:cu,pass:pa,name:na,week:wk,ag});}bA[ag]=rows;});
const aA=Object.values(bA).flat().filter(r=>r.week!==0);S.importPreview={weekLabel:wl,byAgency:bA,allActive:aA,agencyMarkers:mk};rIP();}catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);}
function rIP(){const p=S.importPreview;if(!p)return;const el=document.getElementById('ip');if(!el)return;const sems=sArr();const li=sems.length-1;el.innerHTML=`<div class="card"><div class="ch"><span class="ct">Vista previa — ${semDisplay(p.weekLabel)}</span><button class="btn-i" onclick="cI()">✓ Confirmar importación</button></div>${p.agencyMarkers.map(({ag})=>{const rows=sortQZ((p.byAgency[ag]||[]).filter(r=>r.week!==0).map(r=>({...r,id:r.cust})));if(!rows.length)return'';return`<div style="padding:10px 14px 0"><div style="font-size:12px;font-weight:600;margin-bottom:6px">${ag} — ${rows.length} activos</div><div class="tw"><table style="font-size:11px;margin-bottom:10px"><thead><tr><th>Código</th><th>Nombre</th><th>Balance</th><th>Arrastre</th><th>A cobrar</th></tr></thead><tbody>${rows.map(r=>{const ex=S.clients[r.cust];const pct=ex?(ex.descuento||DD):DD;const d=r.week<0?Math.round(Math.abs(r.week)*pct/100):0;const ac=r.week<0?Math.abs(r.week)-d:0;const ar=ex?arNet(r.cust,li+1,sems,S.cortes):0;const tot=ac+(ar<0?Math.abs(ar):0);return`<tr><td><span class="qz">${r.cust}</span></td><td>${r.name}</td><td style="color:${r.week<0?'var(--re)':'var(--gr)'};font-weight:600">${fSign(r.week)}</td><td>${arCell(ar)}</td><td style="font-weight:600;color:var(--re)">${tot>0?fNeg(tot):'—'}</td></tr>`;}).join('')}</tbody></table></div></div>`;}).join('')}</div>`;}
function cI(){const p=S.importPreview;if(!p)return;if(!S.semanas.find(s=>s.label===p.weekLabel))S.semanas.push({label:p.weekLabel});S.cortes=S.cortes.filter(c=>c.semana!==p.weekLabel);p.agencyMarkers.forEach(({ag})=>{if(!S.agencies.includes(ag)){S.agencies.push(ag);S.agencies.sort();}});p.allActive.forEach(r=>{if(!S.clients[r.cust])S.clients[r.cust]={id:r.cust,nombre:r.name,usuario:r.pass,linea:0,descuento:DD,status:'activo',agencia:r.ag,telefono:'',email:''};else{S.clients[r.cust].nombre=r.name;S.clients[r.cust].agencia=r.ag;}const cl=S.clients[r.cust];const pct=cl.descuento||DD;const d=r.week<0?Math.round(Math.abs(r.week)*pct/100):0;S.cortes.push({id:S.nextCorteId++,clienteId:r.cust,semana:p.weekLabel,balance:r.week,descuentoAplicado:d,montoCobrado:0,pagadoGanancia:0,metodo:'',notas:'',status:r.week>0?'ganancia':'pendiente',comprobante:null,fechaPago:null});});aL(`Importó ${semDisplay(p.weekLabel)} — ${p.allActive.length} cortes`);S.importPreview=null;S.semFilter=p.weekLabel;sV('cobranza');}

function exportECExcel(cid){
  const cl=cO(cid);const rows=ecRows(cid);

function exportECPDF(cid){
  const cl=cO(cid);const rows=ecRows(cid);const totalPend=rows.length?rows[rows.length-1].saldoAcum:0;

  <div class="resumen">Saldo al corte: <strong style="color:${totalPend>0?'#2d8c4e':totalPend<0?'#c93030':'#2d8c4e'}">${totalPend>0?'+$'+totalPend.toLocaleString('es-MX'):totalPend<0?'-$'+Math.abs(totalPend).toLocaleString('es-MX'):'Al corriente'}</strong></div>
  <table><thead><tr><th>Semana</th><th>Resultado</th><th>Descuento</th><th>Balance neto</th><th>Cobrado/Pagado</th><th>Saldo al corte</th><th>Estatus</th></tr></thead><tbody>${trs}</tbody></table>
  <div class="footer">Pick2Score — Sistema de Cobranza</div></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>{w.focus();w.print();},400);
  aL(`Exportó EC de ${cl.nombre} a PDF`);
}

function cModal(){S.modal=null;rModal();}
function oP(cId){
  const c=S.cortes.find(x=>x.id===cId);if(!c)return;
  const cl=cO(c.clienteId);const sems=sArr();const idx=siOf(c.semana);
  const ar=car2(c.clienteId,idx,sems,S.cortes); // car2 retorna deuda pendiente (valor positivo = nos debe)
  const aCS=Math.abs(c.balance)-c.descuentoAplicado;
  const deudaTotal=aCS+(ar<0?Math.abs(ar):0); // ar<0 significa que nos deben (arNet negativo = car2 positivo invertido)
  // Realmente car2 aqui devuelve saldo anterior: si es negativo significa que nos deben de antes
  const arDeuda=Math.max(0,-car2(c.clienteId,idx,sems,S.cortes)); // Cuánto nos deben de antes
  const tot=r2(aCS+arDeuda-c.montoCobrado);
  S.modal='pago';S.modalData={corteId:cId,clienteId:c.clienteId,nombre:cl.nombre,semana:c.semana,semDisplay:semDisplay(c.semana),balance:c.balance,descuentoAplicado:c.descuentoAplicado,arrastre:arDeuda,aCobrarSemana:aCS,totalACobrar:Math.max(0,tot),montoCobradoPrevio:c.montoCobrado,monto:String(r2(Math.max(0,tot))),metodo:c.metodo||'transferencia',notas:c.notas||'',comprobante:c.comprobante||null,editMode:false};rModal();
}
function oEditPago(cId){
  const c=S.cortes.find(x=>x.id===cId);if(!c)return;
  const cl=cO(c.clienteId);const sems=sArr();const idx=siOf(c.semana);
  const aCS=Math.abs(c.balance)-c.descuentoAplicado;
  const arDeuda=Math.max(0,-car2(c.clienteId,idx,sems,S.cortes));
  const tot=r2(aCS+arDeuda);
  S.modal='pago';S.modalData={corteId:cId,clienteId:c.clienteId,nombre:cl.nombre,semana:c.semana,semDisplay:semDisplay(c.semana),balance:c.balance,descuentoAplicado:c.descuentoAplicado,arrastre:arDeuda,aCobrarSemana:aCS,totalACobrar:tot,montoCobradoPrevio:0,monto:String(r2(c.montoCobrado)),metodo:c.metodo||'transferencia',notas:c.notas||'',comprobante:c.comprobante||null,editMode:true};rModal();
}
function cPago(){
  const d=S.modalData;const idx2=S.cortes.findIndex(c=>c.id===d.corteId);if(idx2<0)return;
  const m=parseFloat(d.monto)||0;if(m<0){alert('Monto inválido.');return;}
  const tot=r2(d.aCobrarSemana+d.arrastre);
  S.cortes[idx2].montoCobrado=d.editMode?r2(m):r2(d.montoCobradoPrevio+m);
  S.cortes[idx2].metodo=d.metodo;S.cortes[idx2].notas=d.notas;
  const nc=S.cortes[idx2].montoCobrado;
  S.cortes[idx2].status=nc<=0?'pendiente':nc>=tot-1?'cobrado':'parcial';
  if(d.comprobante)S.cortes[idx2].comprobante=d.comprobante;
  S.cortes[idx2].fechaPago=m>0?new Date().toISOString():null;
  aL(`${d.editMode?'Corrigió':'Registró'} cobro de ${d.nombre} — ${fM(m)}`);cModal();rView();
}

        <div class="fg"><label>${d.editMode?'Monto correcto':'Monto recibido'} ($)</label>
          <input type="text" inputmode="decimal" id="mp" autocomplete="off" value="${d.monto}" oninput="S.modalData.monto=this.value;updMontoHint()" style="font-size:22px;padding:14px;font-weight:700;text-align:center"/>
          <div id="monto-hint" style="font-size:12px;margin-top:6px;text-align:center;min-height:20px">${(()=>{if(d.editMode&&m===0)return`<span style="color:var(--re)">→ revertirá a Pendiente</span>`;if(m>0&&m<tot-0.5)return`<span style="color:var(--am)">Pago parcial — pendiente <strong>${fM(tot-m)}</strong></span>`;if(m>=tot-0.5&&m>0)return`<span style="color:var(--gr);font-weight:600">✓ Pago completo</span>`;return'';})()}</div>
        </div>
        <div class="fg"><label>Método</label><div class="mb-row">
          <button class="mb-btn${d.metodo==='transferencia'?' active':''}" onclick="S.modalData.metodo='transferencia';rModal()">Transferencia</button>
          <button class="mb-btn${d.metodo==='efectivo'?' active':''}" onclick="S.modalData.metodo='efectivo';rModal()">Efectivo</button>
          <button class="mb-btn${d.metodo==='otro'?' active':''}" onclick="S.modalData.metodo='otro';rModal()">Otro</button>
        </div></div>
        ${compBlock()}
        <div class="fg"><label>Notas</label><textarea oninput="S.modalData.notas=this.value" placeholder="Referencia, observaciones...">${d.notas||''}</textarea></div>
      </div>
      <div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-pay" style="padding:10px 22px;font-size:14px;${d.editMode?'background:var(--am)':''}" onclick="cPago()">${d.editMode?'✎ Guardar corrección':'Confirmar cobro'}</button></div>
    </div></div>`;
    setTimeout(()=>{const i=document.getElementById('mp');if(i){i.focus();i.select();}},100);return;
  }

  if(S.modal==='payout'){
    const d=S.modalData;
    mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal">
      <div class="modal-drag"></div>
      <div class="mh"><div><div class="mt">${d.editMode?'✎ Editar pago':'Pagar ganancia al cliente'}</div><div class="ms">${d.nombre} · ${d.semDisplay}</div></div><button class="xb" onclick="cModal()">×</button></div>
      <div class="mb2">
        <div class="pr"><div class="prow tot"><span class="lbl" style="font-weight:600">Ganancia del cliente</span><span style="font-size:18px;color:var(--gr);font-weight:700">${fPos(d.balance)}</span></div></div>
        <div class="fg"><label>Monto pagado ($)</label>
          <input type="text" inputmode="decimal" id="mp2" autocomplete="off" value="${d.monto}" oninput="S.modalData.monto=this.value" style="font-size:22px;padding:14px;font-weight:700;text-align:center"/>
        </div>
        <div class="fg"><label>Método</label><div class="mb-row">
          <button class="mb-btn${d.metodo==='transferencia'?' active':''}" onclick="S.modalData.metodo='transferencia';rModal()">Transferencia</button>
          <button class="mb-btn${d.metodo==='efectivo'?' active':''}" onclick="S.modalData.metodo='efectivo';rModal()">Efectivo</button>
          <button class="mb-btn${d.metodo==='otro'?' active':''}" onclick="S.modalData.metodo='otro';rModal()">Otro</button>
        </div></div>
        ${compBlock()}
        <div class="fg"><label>Notas</label><textarea oninput="S.modalData.notas=this.value" placeholder="Referencia...">${d.notas||''}</textarea></div>
      </div>
      <div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-payout" style="padding:10px 22px;font-size:14px;${d.editMode?'background:var(--am)':''}" onclick="cPout()">${d.editMode?'✎ Guardar':'Confirmar pago'}</button></div>
    </div></div>`;
    setTimeout(()=>{const i=document.getElementById('mp2');if(i){i.focus();i.select();}},100);return;
  }

  if(S.modal==='new-client'||S.modal==='edit-client'){
    const d=S.modalData;const isN=S.modal==='new-client';
    mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="modal-drag"></div><div class="mh"><span class="mt">${isN?'Nuevo cliente':'Editar cliente'}</span><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="sdiv">Datos generales</div><div class="fr"><div class="fg"><label>Nombre</label><input value="${d.nombre}" oninput="S.modalData.nombre=this.value" placeholder="NOMBRE"/></div><div class="fg"><label>Agencia</label><select onchange="S.modalData.agencia=this.value">${S.agencies.map(ag=>`<option value="${ag}" ${d.agencia===ag?'selected':''}>${ag}</option>`).join('')}</select></div></div><div class="fr"><div class="fg"><label>Descuento (%)</label><input type="number" min="0" max="100" step="0.5" value="${d.descuento}" oninput="S.modalData.descuento=this.value"/></div><div class="fg"><label>Estado</label><select onchange="S.modalData.status=this.value"><option value="activo" ${d.status==='activo'?'selected':''}>Activo</option><option value="suspendido" ${d.status==='suspendido'?'selected':''}>Suspendido</option></select></div></div><div class="sdiv" style="margin-top:4px">Contacto</div><div class="fr"><div class="fg"><label>Teléfono / WhatsApp</label><input type="tel" value="${d.telefono||''}" oninput="S.modalData.telefono=this.value" placeholder="5512345678"/></div><div class="fg"><label>Email</label><input type="email" value="${d.email||''}" oninput="S.modalData.email=this.value" placeholder="cliente@email.com"/></div></div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sClient()">Guardar</button></div></div></div>`;return;
  }

  if(S.modal==='new-user'||S.modal==='edit-user'){
    const d=S.modalData;const isN=S.modal==='new-user';
    mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="modal-drag"></div><div class="mh"><div class="mt">${isN?'Nuevo usuario':'Editar usuario'}</div><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="fr"><div class="fg"><label>Nombre</label><input value="${d.nombre}" oninput="S.modalData.nombre=this.value" placeholder="Nombre Apellido"/></div><div class="fg"><label>Usuario</label><input value="${d.username}" oninput="S.modalData.username=this.value" placeholder="usuario123"/></div></div><div class="fg"><label>Contraseña</label><input type="password" value="${d.password||''}" oninput="S.modalData.password=this.value" placeholder="${isN?'Contraseña':'Dejar vacío para no cambiar'}"/></div><div class="fg"><label>Rol</label><div class="rl"><button class="rb${d.rol==='admin'?' ra':''}" onclick="S.modalData.rol='admin';rModal()">Admin</button><button class="rb${d.rol==='capturista'?' rc':''}" onclick="S.modalData.rol='capturista';rModal()">Capturista</button><button class="rb${d.rol==='viewer'?' rv':''}" onclick="S.modalData.rol='viewer';rModal()">Visualizador</button></div></div><div class="fg"><label>Acceso a agencias</label><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px"><button class="tab${d.agencias.includes('__all__')?' active':''}" onclick="tAU('__all__')" style="font-size:11px">Todas</button>${S.agencies.map(ag=>`<button class="tab${d.agencias.includes(ag)&&!d.agencias.includes('__all__')?' active':''}" onclick="tAU('${ag}')" style="font-size:11px">${ag}</button>`).join('')}</div></div><div class="notice" style="font-size:11px"><strong>Permisos (${d.rol}):</strong> ${Object.entries(RP[d.rol]||{}).filter(([k,v])=>v).map(([k])=>k.replace(/_/g,' ')).join(' · ')}</div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sUser()">Guardar</button></div></div></div>`;return;
  }

  if(S.modal==='new-corte'||S.modal==='edit-corte'){
    const isE=S.modal==='edit-corte';const d=S.modalData;const bal=parseFloat(d.balance)||0;const desc=parseFloat(d.descuentoAplicado)||0;const ac=bal<0?Math.abs(bal)-desc:0;
    mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)cModal()"><div class="modal"><div class="modal-drag"></div><div class="mh"><span class="mt">${isE?'Editar corte':'Registrar corte'}</span><button class="xb" onclick="cModal()">×</button></div><div class="mb2"><div class="fr"><div class="fg"><label>Cliente</label><select onchange="S.modalData.clienteId=this.value;aD()"><option value="">Seleccionar...</option>${fC().map(c=>`<option value="${c.id}" ${d.clienteId===c.id?'selected':''}>${c.id} — ${c.nombre}</option>`).join('')}</select></div><div class="fg"><label>Semana</label><select onchange="S.modalData.semana=this.value">${sems.map(s=>`<option value="${s}" ${d.semana===s?'selected':''}>${semDisplay(s)}</option>`).join('')}</select></div></div><div class="fr"><div class="fg"><label>Balance ($)</label><input type="number" value="${d.balance}" oninput="S.modalData.balance=this.value;aD()" placeholder="-5000"/></div><div class="fg"><label>Descuento ($)</label><input type="number" value="${d.descuentoAplicado}" oninput="S.modalData.descuentoAplicado=this.value;rModal()" placeholder="0"/></div></div>${ac>0?`<div style="background:var(--amb);border:0.5px solid var(--am);border-radius:8px;padding:9px 13px;font-size:13px">A cobrar: <strong>${fM(ac)}</strong></div>`:''}<div class="fg"><label>Estado</label><select onchange="S.modalData.status=this.value"><option value="pendiente" ${d.status==='pendiente'?'selected':''}>Pendiente</option><option value="cobrado" ${d.status==='cobrado'?'selected':''}>Cobrado</option><option value="parcial" ${d.status==='parcial'?'selected':''}>Parcial</option><option value="ganancia" ${d.status==='ganancia'?'selected':''}>Ganancia</option></select></div></div><div class="mf"><button class="btn-g" onclick="cModal()">Cancelar</button><button class="btn-p" onclick="sCorte(${isE})">Guardar</button></div></div></div>`;
  }
}
render();
</script>
</body>
</html>
